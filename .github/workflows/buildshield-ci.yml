name: BuildShield-CI Security Gate

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  security-events: write

jobs:
  buildshield-security-gate:
    name: BuildShield-CI Policy Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install BuildShield-CI
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Validate CLI installation
        run: |
          buildshield --help
          buildshield version
          supplysentinel version

      - name: Run automated test suite
        run: |
          pytest -q

      - name: Run secure repository policy gate
        run: |
          buildshield scan samples/secure-repo \
            --policy buildshield-policy.yml \
            --fail-on-policy \
            --hide-files \
            --report-format html \
            --output reports/secure-policy-report.html

          buildshield scan samples/secure-repo \
            --policy buildshield-policy.yml \
            --report-format json \
            --output reports/secure-policy-report.json

          buildshield scan samples/secure-repo \
            --policy buildshield-policy.yml \
            --report-format md \
            --output reports/secure-policy-report.md

      - name: Demonstrate vulnerable repository policy failure
        continue-on-error: true
        run: |
          buildshield scan samples/vulnerable-repo \
            --policy buildshield-policy.yml \
            --fail-on-policy \
            --hide-files

      - name: Generate vulnerable repository reports
        if: always()
        run: |
          buildshield scan samples/vulnerable-repo \
            --policy buildshield-policy.yml \
            --report-format html \
            --output reports/vulnerable-policy-report.html

          buildshield scan samples/vulnerable-repo \
            --policy buildshield-policy.yml \
            --report-format json \
            --output reports/vulnerable-policy-report.json

          buildshield scan samples/vulnerable-repo \
            --policy buildshield-policy.yml \
            --report-format md \
            --output reports/vulnerable-policy-report.md

      - name: Generate SARIF report for GitHub code scanning
        if: always()
        run: |
          buildshield scan samples/vulnerable-repo \
            --policy buildshield-policy.yml \
            --report-format sarif \
            --output reports/buildshield-results.sarif

      - name: Upload SARIF to GitHub code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: reports/buildshield-results.sarif
          category: buildshield-ci

      - name: Generate before-after comparison reports
        if: always()
        run: |
          buildshield compare samples/vulnerable-repo samples/secure-repo \
            --report-format html \
            --output reports/comparison-report.html

          buildshield compare samples/vulnerable-repo samples/secure-repo \
            --report-format json \
            --output reports/comparison-report.json

          buildshield compare samples/vulnerable-repo samples/secure-repo \
            --report-format md \
            --output reports/comparison-report.md

      - name: Upload BuildShield-CI reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: buildshield-ci-security-reports
          path: reports/
          if-no-files-found: error