services:
  buildshield-ci:
    build:
      context: .
      dockerfile: Dockerfile
    image: buildshield-ci:latest
    container_name: buildshield-ci
    ports:
      - "8080:8080"
    environment:
      BUILDSHIELD_HOST: "0.0.0.0"
      BUILDSHIELD_PORT: "8080"
      BUILDSHIELD_ENV: "production"
    volumes:
      - buildshield_reports:/app/reports
      - buildshield_data:/app/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=3)"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  buildshield_reports:
  buildshield_data: